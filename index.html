<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orange Cat Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="layout">
    <section>
      <h1>🐈 Orange Cat Tetris</h1>
      <canvas id="game" width="300" height="600" aria-label="Orange Cat Tetris game board"></canvas>
    </section>

    <aside class="panel">
      <h2>How to Play</h2>
      <ul>
        <li>⬅️ / ➡️ Move</li>
        <li>⬇️ Soft drop</li>
        <li>⬆️ Rotate</li>
        <li>Space Hard drop</li>
        <li>P Pause / Resume</li>
      </ul>
      <p><strong>Score:</strong> <span id="score">0</span></p>
      <p><strong>Lines:</strong> <span id="lines">0</span></p>
      <button id="musicToggle">🎵 Mute Music</button>
      <button id="restart">🔁 Restart</button>
      <p class="note">8-bit retro soundtrack included. Press any key to unlock audio.</p>
    </aside>
  </main>

  <script src="game.js"></script>
</body>
</html>
